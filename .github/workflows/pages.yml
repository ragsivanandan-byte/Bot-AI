name: Rafraîchir les données STRC

# Le site est servi directement par GitHub Pages depuis le dossier /docs de main
# (Settings → Pages → Deploy from a branch → main → /docs). Ce workflow ne fait
# QUE régénérer docs/data/strc.json (closing prices) et le commiter s'il change.
on:
  schedule:
    - cron: "0 6 * * 1"   # lundi 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: strc-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Régénérer docs/data/strc.json (live, fallback snapshot)
        run: python3 build_web_data.py -v || python3 build_web_data.py --no-live -v

      - name: Commiter si les données ont changé
        run: |
          if ! git diff --quiet -- docs/data/strc.json; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add docs/data/strc.json
            git commit -m "Refresh STRC weekly closes [skip ci]"
            git push
          else
            echo "Aucun changement de données STRC."
          fi
