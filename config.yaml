# =============================================================================
# config.yaml — Configuration de l'outil d'intelligence marché NeutralWallDesign
# -----------------------------------------------------------------------------
# Tu peux modifier ce fichier SANS toucher au code Python.
# Tout ce qui est paramétrable est ici : mots-clés, concurrents, palette, etc.
# Chaque champ est commenté. Les valeurs marquées "# A VERIFIER" sont des
# hypothèses de départ non confirmées (voir LIMITS.md).
# =============================================================================

# --- Ma boutique -------------------------------------------------------------
# Sert de référentiel pour les comparaisons "ce que les concurrents font mieux".
# Mets à jour ces chiffres à la main quand ils changent (ils ne sont pas scrapés
# automatiquement sur ta propre boutique pour éviter toute donnée périmée).
shop:
  name: "NeutralWallDesign"
  url: "https://www.etsy.com/shop/NeutralWallDesign"   # JAMAIS de prefixe pays (/au/, /fr/)
  market: "com"                # "com" => URL sans prefixe pays (canonique)
  active_listings: 20          # ~20 fiches actives (corrige par Claude Chat 06/06)
  total_sales: 2               # ventes publiques affichées
  reviews: 1
  avg_rating: 5.0
  avg_price_eur: 6.90          # single 6,90 € (set de 3 : 13,90 € ; set de 6 : 26,90 €)
  age_months: 2
  formats: ["single", "set"]   # singles + sets de 3 + set de 6
  ratios_delivered: 5          # sets = 5 ratios ; singles = 2 ratios (2:3 + 3:4)

# --- Niche et mots-clés ------------------------------------------------------
# Le coeur du ciblage. Ajoute/retire librement.
niche:
  # Piliers de la niche (utilisés pour la recherche concurrentielle et le SEO)
  pillars:
    - "boho wall art printable"
    - "terracotta wall art"
    - "japandi wall art"
    - "wabi sabi art print"
    - "neutral nursery wall art"
    - "organic minimalist wall art"
    - "celestial wall art neutral"
    - "warm minimalist print set"
  # Sous-niches SOUS-EXPLOITÉES à prioriser (carte anti-répétition Claude Chat 06/06)
  emerging_subniches:
    - "panoramic above sofa wall art"      # ratios 2:1 / 3:1 / 5:2
    - "frame tv art neutral"               # 16:9
    - "neutral adult bedroom wall art"
    - "desk entryway minimalist art"
    - "scandi japandi gallery wall"
  # Sujets SATURÉS (déjà très couverts par la boutique/concurrents) -> à EVITER
  # dans les nouveaux prompts (anti-répétition).
  saturated_topics:
    - "terracotta arch"
    - "boho moon"
    - "boho sun"
    - "nursery"
    - "highland cow"
    - "boho rainbow generic"
    - "single line face one line drawing"
    - "minimalist mountain range"

# --- Concurrents à suivre ----------------------------------------------------
# Concurrentes RÉELLES identifiées par Ragavan, validées à la main sur Etsy.
#
# >>> SAISIE MANUELLE DES CHIFFRES PUBLICS (recommandée) <<<
# L'API Etsy interdit largement la collecte de données sur d'AUTRES boutiques.
# La voie 100% conforme = noter toi-même les chiffres PUBLICS visibles sur la
# page de chaque boutique, dans un bloc `data:`. L'outil les utilise alors pour
# toute l'analyse (CA estimé, inférence IA, comparaison, évolution).
# Mets à jour ces chiffres quand tu passes voir les boutiques (1x/semaine suffit).
#
# Champs disponibles dans `data:` (tous optionnels, laisse vide si inconnu) :
#   sales: <int>          # nombre de ventes affiché
#   listings: <int>       # nb de fiches actives
#   reviews: <int>        # nb d'avis
#   rating: <float>       # note moyenne (ex: 4.9)
#   price: <float>        # prix moyen/representatif affiché
#   price_min: <float>    # prix le plus bas
#   price_max: <float>    # prix le plus haut (ex: prix barre d'origine)
#   currency: "USD"       # devise affichée (USD/EUR/GBP/AUD...) -> conversion en EUR
#   strikethrough: true   # promo / prix barre present ?
#   since_year: 2016      # annee d'ouverture
#   titles: ["..."]       # 1-2 titres de fiches (sert a l'analyse de patterns)
competitors:
  - slug: "NeutralWallDesign"   # toi-meme, pour reference dans le classement
    market: "com"               # pas de prefixe pays
    note: "ma boutique (reference). Chiffres a mettre a jour quand ils evoluent."
    data:
      sales: 2
      listings: 20
      reviews: 1
      rating: 5.0
      price: 6.90         # single ; sets 13,90 / 26,90 €
      since_year: 2026
  - slug: "MusingsOfMeiMei"
    market: "com"
    note: "Poids lourd nursery/boho neutre (Adelaide AU). DESSIN A LA MAIN (hand-lettering/hand-drawing declare dans son About) -> A EXCLURE du benchmark 'boutiques IA'. Sets de 3, promo permanente -40%."
    data:
      sales: 28300
      reviews: 3800
      rating: 5.0
      price: 8.16          # prix promo actuel
      price_max: 13.59     # prix barre d'origine
      currency: "USD"      # A VERIFIER (boutique AU : peut etre AUD)
      strikethrough: true
      since_year: 2016
      handmade: true        # dessin main declare -> jamais marquer "IA"
      titles: ["Boho Neutral Nursery Wall Art Set of 3 Printable Earthy Terracotta"]
  - slug: "MyAestheticAlley"
    market: "com"
    note: "MIROIR le plus proche (Allemagne UE, 2 ans). Japandi neutre, sets de 3, IA-assistee assumee, taille perso en add-on payant. A etudier en priorite."
    data:
      sales: 1200
      reviews: 81
      rating: 4.9
      price: 14.00
      currency: "USD"      # A VERIFIER
      since_year: 2024
      ai_mirror: true       # boutique IA-miroir -> suivie dans la veille hebdo IA
      titles: ["Japandi Wall Art Set of 3 Neutral Minimalist Printable Digital Download"]
  - slug: "EmaParaschivArt"
    market: "com"
    note: "Wabi-sabi / earth tone (mocha/taupe/cream). Star Seller. Bucarest (Roumanie, UE). Tier 2."
    data:
      # Source : recherche web (snippets Google), À VÉRIFIER sur la page Etsy.
      listings: 292
      reviews: 530
      rating: 4.9
      # sales: NON trouvé via recherche -> complete-le en visitant la page.
      # price: non trouve -> l'outil utilisera la fourchette de repli (config).
      titles: ["Wabi Sabi Abstract Art Print Japandi Decor Earthy Neutral"]
  - slug: "DigivitesPrints"
    market: "com"
    note: "Specialiste nursery/kids (Suzi). Star Seller. Slug CONFIRME = DigivitesPrints (et non Digivites). Livraison Dropbox."
    data:
      # Source : recherche web (snippets), À VÉRIFIER. Gros volume nursery.
      sales: 47900        # ~47.9k (snippet)
      reviews: 6600       # ~6.6k
      rating: 4.9
      since_year: 2013    # approx, a confirmer
      titles: ["Safari Animal Nursery Print Set of 6 Baby Animal Wall Art"]
  - slug: "ZegaStudio"
    market: "com"
    note: "Boho neutre / sun & celestial decor (Jaclyn, Queens NY). Instant download. Codes promo PRINTS20/30/40/50. Concurrent coeur boho/celestial."
    data:
      # Source : recherche web (snippets), À VÉRIFIER. (snippet ambigu: 2,98k vs 3,2k ventes)
      sales: 3200
      reviews: 210
      rating: 5.0
      since_year: 2021    # "5 ans sur Etsy" (approx)
      strikethrough: true # codes promo permanents
      currency: "USD"     # boutique a Queens, NY
      titles: ["Boho Sun Wall Decor Printable Neutral Aesthetic Wall Art"]

# --- Découverte automatique de concurrents -----------------------------------
# Requetes de recherche Etsy publique utilisees pour decouvrir de nouveaux
# concurrents (mode live uniquement). Resultats a valider a la main.
discovery:
  enabled: true
  search_queries:
    - "japandi wall art printable"
    - "terracotta boho print set"
    - "neutral nursery printable set"
    - "wabi sabi wall art"
  max_results_per_query: 24

# --- Estimation de CA (transparence totale, voir LIMITS.md) ------------------
# Le CA reel d'une boutique Etsy n'est PAS public. On l'ESTIME uniquement.
# Formule utilisee : voir src/analysis.py (estimate_revenue).
revenue_estimation:
  # Hypothese de duree de vie moyenne d'une boutique pour repartir les ventes
  # lifetime en run-rate mensuel. Tres approximatif -> marge d'erreur enorme.
  assumed_min_monthly_growth: false
  # Fourchette de prix moyen si le prix d'une fiche est indisponible (EUR)
  fallback_avg_price_eur_low: 4.0
  fallback_avg_price_eur_high: 12.0
  # Part des ventes survenant sur les 30 derniers jours (heuristique grossiere
  # pour les boutiques etablies). Marge d'erreur tres elevee.
  recent_sales_share_low: 0.02
  recent_sales_share_high: 0.08

# --- Heuristique "probablement IA" (INFERENCE, jamais une certitude) ---------
# Chaque signal ajoute des points. Au-dela du seuil -> marque "INFERENCE IA".
ai_inference:
  enabled: true
  threshold: 4                 # score min pour marquer "probablement IA"
  weights:
    low_price: 2               # prix moyen tres bas
    high_listing_count: 2      # depot massif de fiches
    high_sales_velocity: 1     # ventes elevees vs anciennete
    keyword_stuffed_titles: 2  # titres a rallonge / mots-cles empiles
    young_shop_high_volume: 1  # boutique jeune + gros volume
  low_price_threshold_eur: 3.5
  high_listing_count_threshold: 150
  young_shop_months_threshold: 6

# --- Paramètres réseau / scraping respectueux --------------------------------
network:
  # User-agent honnete : identifie l'outil et un contact. Personnalise l'email.
  user_agent: "NeutralWallDesign-MarketIntel/1.0 (+contact: r.sivanandan@me.com) respectful-research"
  request_timeout_seconds: 20
  # Delai mini entre deux requetes vers le meme domaine (rate limiting strict)
  min_delay_seconds: 4.0
  max_delay_jitter_seconds: 3.0   # delai aleatoire ajoute pour ne pas marteler
  max_retries: 4
  backoff_base_seconds: 2.0       # 2s, 4s, 8s, 16s
  respect_robots_txt: true        # NE PAS desactiver (CGU)
  cache_ttl_hours: 12             # reutilise le cache local sous ce delai
  cache_dir: "cache"

# --- Production visuelle quotidienne (Grok Imagine / Grok Build) --------------
# Flux du jour : 3 prompts d'IMAGES BRUTES (un set de 3 designs) -> 4 prompts de
# MOCKUPS (dont 1 COVER) -> 1 prompt VIDÉO 6 s. Formules ÉPROUVÉES (Claude Chat).
# Génération + QC + publication restent MANUELS (voir README / brief).
grok_prompts:
  count_per_day: 5             # (héritage : nb de prompts si recettes absentes)
  # Sortie imposée : tout (images/mockups/vidéo) va dans le dossier Téléchargements.
  output_dir: "~/Downloads"
  set_size: 3                  # un set = 3 designs cohérents
  # --- Génération automatique via Grok Build (headless) --------------------
  auto_generate: true          # 7h : génère les designs bruts via `grok -p`
  variations_per_design: 8     # nb de variations générées par design (choix au QC)
  grok_command: "grok"         # binaire Grok Build (dans le PATH après install)
  per_call_timeout_s: 300      # délai max par génération (s)
  # Palette warm/neutre (noms + codes hex). Imposer les HEX dans les prompts.
  palette:
    - "terracotta #B5754F"
    - "muted sand #D8C3A5"
    - "soft cream #F3EBDD"
    - "olive sage #8A8B6C"
    - "warm taupe #B9A88F"
    - "oat beige #E7DCC8"
  styles:
    - "warm minimalist organic"
    - "wabi-sabi organic"
    - "japandi flat"
  # Scènes de pièce pour les mockups d'ambiance (cadre chêne clair + passe-partout).
  mockup_rooms:
    - "above a neutral linen bed"
    - "on a console table with a ceramic vase and dried grass"
    - "leaning on a wooden shelf next to a monstera"
    - "in a calm home-office above a light wood desk"
    - "above a beige linen sofa, generous wall space"
  # RECETTES de sets (sous-exploitées, anti-répétition). L'outil pioche une
  # recette/jour (rotation par date). designs = 3 sujets en FORMES PLEINES.
  set_recipes:
    - name: "Warm organic shapes (adult bedroom)"
      keyword: "neutral organic shapes wall art set"
      format: "2:3 vertical"
      designs:
        - "ONE large bold solid arch + ONE solid circle, two flat color blocks only"
        - "solid filled rolling dune ridge silhouette, layered flat horizontal bands"
        - "solid filled organic pebble cluster, three flat color blocks"
    - name: "Botanical trio (sage + warm)"
      keyword: "neutral botanical line wall art set"
      format: "2:3 vertical"
      # Discipline anti-confusion : EUCALYPTUS != OLIVE BRANCH != FERN.
      designs:
        - "solid filled eucalyptus sprig silhouette (oval leaves + small berries)"
        - "solid filled olive branch silhouette (thin arc, spaced narrow leaves)"
        - "solid filled fern frond silhouette (serrated frond + curled crozier)"
    - name: "Above-sofa panorama (wide)"
      keyword: "panoramic above sofa wall art"
      format: "3:1 horizontal panorama"
      designs:
        - "solid filled wide horizon bands, calm layered flat color blocks, panoramic"
        - "solid filled abstract dune ridge, soft wide silhouette, panoramic"
        - "ONE large solid arch low on the horizon + flat sky block, panoramic"
    - name: "Frame TV art (neutral)"
      keyword: "frame tv art neutral organic"
      format: "16:9 horizontal"
      designs:
        - "solid filled minimalist organic landscape, flat color blocks, 16:9"
        - "solid filled abstract arch and pebble composition, flat blocks, 16:9"
        - "solid filled wavy horizon and sun block, muted flat tones, 16:9"

# --- Connecteurs API (optionnels) --------------------------------------------
# Les CLÉS ne se mettent JAMAIS ici : elles se lisent dans des variables
# d'environnement (voir README). Ici on règle juste l'activation et les options.
api:
  # API officielle Etsy (GRATUITE). Clé attendue dans la variable ETSY_API_KEY.
  # Si la clé est absente, l'outil retombe automatiquement sur le parsing HTML.
  use_etsy_api: true
  # Keywords Everywhere (PAYANT, ~10-15€/mois en crédits) pour les volumes de
  # recherche réels. Clé attendue dans KEYWORDS_EVERYWHERE_API_KEY.
  # Si absente, l'outil retombe sur Google Trends (intérêt relatif).
  use_keywords_everywhere: true
  keywords_country: "fr"     # marché ciblé pour les volumes (fr, us, gb, au...)
  keywords_currency: "eur"

# --- Conversion des devises en EUR -------------------------------------------
# Les prix de l'API Etsy sont dans la devise de la boutique : on les convertit
# en EUR. Source gratuite sans clé (BCE via Frankfurter), avec cache et repli
# statique si le réseau est indisponible (voir LIMITS.md).
currency_conversion:
  enabled: true
  api_url: "https://api.frankfurter.dev/v1/latest"
  cache_ttl_hours: 24

# --- Sortie ------------------------------------------------------------------
output:
  # Les 3 rapports vont dans ~/Downloads/reports/AAAA-MM-JJ/ (Téléchargements).
  # Le `~` est développé automatiquement. Mets un chemin absolu si tu préfères.
  reports_dir: "~/Downloads/reports"
  logs_dir: "logs"

# --- Roadmap revenu ----------------------------------------------------------
goals:
  target_net_eur_per_month: 5000
  budget_ads_eur_per_month_low: 100
  budget_ads_eur_per_month_high: 250
  hours_per_day: 4.5
